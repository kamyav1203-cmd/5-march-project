<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Cart</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
}

button{
    background-color:#28a745;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background-color:#218838;
}

#msg{
    margin-top:20px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<h2>Online Store</h2>

<button id="addCart">Add to Cart</button>

<p id="msg"></p>

<script>

document.getElementById("addCart").addEventListener("click", function(){

    console.log("Product added to cart");

    document.getElementById("msg").innerHTML =
    "✅ Item successfully added to cart!";

});

</script>

</body>
</html>
