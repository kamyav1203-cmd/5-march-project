<!DOCTYPE html>
<html lang="en">

<head>
    <title>Task 4 - Customer Support Chat Hover</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        #chatIcon{
            display: inline-block;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        #info{
            margin-top: 15px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>

<body>

<h2>Customer Support</h2>

<div id="chatIcon">💬 Chat Support</div>

<p id="info"></p>

<script>

document.getElementById("chatIcon").addEventListener("mouseover", function(){

    document.getElementById("info").innerText =
    "Click here to talk with customer support";

    console.log("Mouse hovered over chat icon");

});

</script>

</body>
</html>
